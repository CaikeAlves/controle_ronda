<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>Registro de ronda</title>
</head>
<body>
<h1>Registro De Ronda</h1>

{% for ronda in rondas %}
    <a href="/registro/{{ ronda.id }}">
        <p>{{ ronda.nome }} - {{ ronda.tipo }} | <strong>Status: {{ ronda.status }}</strong></p>
    </a>
{% endfor %}
</body>
</html>
