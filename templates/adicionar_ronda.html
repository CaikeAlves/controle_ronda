<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>Adicionar Ronda</title>
</head>
<body>
<label>Escolha o tipo de ronda</label>

<form method="post">
    <select name="tipo">
    <option value="posto">Posto</option>
    <option value="lacre">Lacre</option>
    <option value="secao">Seção</option>
    </select>
    <label>Nome da Ronda</label>
    <input type="text" name="nome_da_ronda">
    <button>Enviar</button>
</form>
</body>
</html>
