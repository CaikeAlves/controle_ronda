<!DOCTYPE html>
<html lang="pt">
<head><meta charset="UTF-8"><title>Editar Usuário</title>
<link rel="stylesheet" href="/static/style.css"></head>
<body>
<div class="container">
    <h1>Editar Usuário</h1>
    <form method="post">
        <label>Nome</label>
        <input type="text" name="nome" value="{{ usuario.nome }}">
        <label>Senha</label>
        <input type="password" name="senha">
        <button class="btn btn-primary">Salvar</button>
        <a href="/ver_usuarios" class="btn btn-secondary">Cancelar</a>
    </form>
</div>
</body></html>
